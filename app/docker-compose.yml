version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: trivy-demo-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: .
    container_name: trivy-demo-app
    ports:
      - "8080:8080"
    depends_on:
      - mongo

volumes:
  mongo_data:
